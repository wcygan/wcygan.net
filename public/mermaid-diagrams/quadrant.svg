<svg id="mermaid-diagrams-quadrant-mmd" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="graphics-document document" aria-roledescription="quadrantChart" aria-describedby="chart-desc-mermaid-diagrams-quadrant-mmd" aria-labelledby="chart-title-mermaid-diagrams-quadrant-mmd" width="500" height="500"><style>
