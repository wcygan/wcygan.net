h="232" height="212" fill="#ffffff"></rect><text x="0" y="0" fill="#000000" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 262) rotate(0)">Reconsider</text></g></g><g class="border"><line x1="30" y1="45" x2="496" y2="45" style="stroke: rgb(70, 110, 170); stroke-width: 2;"></line><line x1="495" y1="46" x2="495" y2="468" style="stroke: rgb(70, 110, 170); stroke-width: 2;"></line><line x1="30" y1="469" x2="496" y2="469" style="stroke: rgb(70, 110, 170); stroke-width: 2;"></line><line x1="31" y1="46" x2="31" y2="468" style="stroke: rgb(70, 110, 170); stroke-width: 2;"></line><line x1="263" y1="46" x2="263" y2="468" style="stroke: rgb(70, 110, 170); stroke-width: 1;"></line><line x1="32" y1="257" x2="494" y2="257" style="stroke: rgb(70, 110, 170); stroke-width: 1;"></line></g><g class="data-points"><g class="data-point"><circle cx="392.92" cy="282.44000000000005" r="5" fill="hsl(0, 0%, NaN%)" stroke="hsl(0, 0%, NaN%)" stroke-width="0px"></circle><text x="0" y="0" fill="#000000" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(392.92, 287.44000000000005) rotate(0)">Rewrite module</text></g><g class="data-point"><circle cx="188.76000000000002" cy="367.24" r="5" fill="hsl(0, 0%, NaN%)" stroke="hsl(0, 0%, NaN%)" stroke-width="0px"></circle><text x="0" y="0" fill="#000000" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(188.76000000000002, 372.24) rotate(0)">Rename files</text></g><g class="data-point"><circle cx="114.52" cy="333.31999999999994" r="5" fill="hsl(0, 0%, NaN%)" stroke="hsl(0, 0%, NaN%)" stroke-width="0px"></circle><text x="0" y="0" fill="#000000" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(114.52, 338.31999999999994) rotate(0)">Clean inbox</text></g><g class="data-point"><circle cx="411.47999999999996" cy="104.36000000000001" r="5" fill="hsl(0, 0%, NaN%)" stroke="hsl(0, 0%, NaN%)" stroke-width="0px"></circle