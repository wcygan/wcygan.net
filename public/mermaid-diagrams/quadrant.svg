</style><title id="chart-title-mermaid-diagrams-quadrant-mmd">Task Priority Matrix</title><desc id="chart-desc-mermaid-diagrams-quadrant-mmd">This quadrant chart organizes generic tasks by effort and impact, separating quick wins, big bets, fill-ins, and work to reconsider.</desc><style>#mermaid-diagrams-quadrant-mmd{font-family:"Inter",system,-apple-system,"system-ui","Helvetica Neue","Lucida Grande",sans-serif;font-size:16px;fill:#000000;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#mermaid-diagrams-quadrant-mmd .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#mermaid-diagrams-quadrant-mmd .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#mermaid-diagrams-quadrant-mmd .error-icon{fill:#f9f9f9;}#mermaid-diagrams-quadrant-mmd .error-text{fill:#D55E00;stroke:#D55E00;}#mermaid-diagrams-quadrant-mmd .edge-thickness-normal{stroke-width:1px;}#mermaid-diagrams-quadrant-mmd .edge-thickness-thick{stroke-width:3.5px;}#mermaid-diagrams-quadrant-mmd .edge-pattern-solid{stroke-dasharray:0;}#mermaid-diagrams-quadrant-mmd .edge-thickness-invisible{stroke-width:0;fill:none;}#mermaid-diagrams-quadrant-mmd .edge-pattern-dashed{stroke-dasharray:3;}#mermaid-diagrams-quadrant-mmd .edge-pattern-dotted{stroke-dasharray:2;}#mermaid-diagrams-quadrant-mmd .marker{fill:#666666;stroke:#666666;}#mermaid-diagrams-quadrant-mmd .marker.cross{stroke:#666666;}#mermaid-diagrams-quadrant-mmd svg{font-family:"Inter",system,-apple-system,"system-ui","Helvetica Neue","Lucida Grande",sans-serif;font-size:16px;}#mermaid-diagrams-quadrant-mmd p{margin:0;}#mermaid-diagrams-quadrant-mmd .node .neo-node{stroke:#466eaa;}#mermaid-diagrams-quadrant-mmd [data-look="neo"].node rect,#mermaid-diagrams-quadrant-mmd [data-look="neo"].cluster rect,#mermaid-diagrams-quadrant-mmd [data-look="neo"].node p