<svg id="mermaid-diagrams-pie-mmd" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 623.40625 450" role="graphics-document document" aria-roledescription="pie" aria-describedby="chart-desc-mermaid-diagrams-pie-mmd" aria-labelledby="chart-title-mermaid-diagrams-pie-mmd" width="623.40625" height="450"><title id="chart-title-mermaid-diagrams-pie-mmd">Technology Stack Distribution</title><desc id="chart-desc-mermaid-diagrams-pie-mmd">This pie chart shows the rough distribution of technologies powering this site: TanStack Start 35%, TypeScript 25%, Tailwind CSS 20%, MDX with Shiki 15%, and Tooling 5%.</desc><style>#mermaid-diagrams-pie-mmd{font-family:"Inter",system,-apple-system,"system-ui","Helvetica Neue","Lucida Grande",sans-serif;font-size:16px;fill:#000000;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#mermaid-diagrams-pie-mmd .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#mermaid-diagrams-pie-mmd .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#mermaid-diagrams-pie-mmd .error-icon{fill:#f9f9f9;}#mermaid-diagrams-pie-mmd .error-text{fill:#D55E00;stroke:#D55E00;}#mermaid-diagrams-pie-mmd .edge-thickness-normal{stroke-width:1px;}#mermaid-diagrams-pie-mmd .edge-thickness-thick{stroke-width:3.5px;}#mermaid-diagrams-pie-mmd .edge-pattern-solid{stroke-dasharray:0;}#mermaid-diagrams-pie-mmd .edge-thickness-invisible{stroke-width:0;fill:none;}#mermaid-diagrams-pie-mmd .edge-pattern-dashed{stroke-dasharray:3;}#mermaid-diagrams-pie-mmd .edge-pattern-dotted{stroke-dasharray:2;}#mermaid-diagrams-pie-mmd .marker{fill:#666666;stroke:#666666;}#mermaid-diagrams-pie-mmd .marker.cross{stroke:#666666;}#mermaid-diagrams-pie-mmd svg{font-family:"Inter",system,-apple-system,"system-ui","Helvetica Neue","Lucida Grande",sans-serif;font-size:16px;}#mermaid-diagrams-pie-mmd p{margin:0;}#mermaid-diagrams-pie-mmd .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#mermaid-diagrams-pie-mmd .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#mermaid-diagrams-pie-mmd .pieTitleText{text-anchor:middle;font-size:25px;fill:#000000;font-family:"Inter",system,-apple-system,"system-ui","Helvetica Neue","Lucida Grande",sans-serif;}#mermaid-diagrams-pie-mmd .slice{font-family:"Inter",system,-apple-system,"system-ui","Helvetica Neue","Lucida Grande",sans-serif;fill:#000000;font-size:17px;}#mermaid-diagrams-pie-mmd .legend text{fill:#000000;font-family:"Inter",system,-apple-system,"system-ui","Helvetica Neue","Lucida Grande",sans-serif;font-size:17px;}#mermaid-diagrams-pie-mmd .node .neo-node{stroke:#466eaa;}#mermaid-diagrams-pie-mmd [data-look="neo"].node rect,#mermaid-diagrams-pie-mmd [data-look="neo"].cluster rect,#mermaid-diagrams-pie-mmd [data-look="neo"].node polygon{stroke:url(#mermaid-diagrams-pie-mmd-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#mermaid-diagrams-pie-mmd [data-look="neo"].node path{stroke:url(#mermaid-diagrams-pie-mmd-gradient);stroke-width:1px;}#mermaid-diagrams-pie-mmd [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#mermaid-diagrams-pie-mmd [data-look="neo"].node .neo-line path{stroke:#466eaa;filter:none;}#mermaid-diagrams-pie-mmd [data-look="neo"].node circle{stroke:url(#mermaid-diagrams-pie-mmd-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#mermaid-diagrams-pie-mmd [data-look="neo"].node circle .state-start{fill:#000000;}#mermaid-diagrams-pie-mmd [data-look="neo"].icon-shape .icon{fill:url(#mermaid-diagrams-pie-mmd-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#mermaid-diagrams-pie-mmd [data-look="neo"].icon-shape .icon-neo path{stroke:url(#mermaid-diagrams-pie-mmd-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#mermaid-diagrams-pie-mmd :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><g transform="translate(225,225)"><circle cx="0" cy="0" r="186" class="pieOuterCircle"></circle><path d="M0,-185A185,185,0,0,1,149.668,108.74L0,0Z" fill="#466eaa" class="pieCircle"></path><path d="M149.668,108.74A185,185,0,0,1,-108.74,149.668L0,0Z" fill="#1e468c" class="pieCircle"></path><path d="M-108.74,149.668A185,185,0,0,1,-175.945,-57.168L0,0Z" fill="#E69F00" class="pieCircle"></path><path d="M-175.945,-57.168A185,185,0,0,1,-57.168,-175.945L0,0Z" fill="#0072B2" class="pieCircle"></path><path d="M-57.168,-175.945A185,185,0,0,1,0,-185L0,0Z" fill="#CC79A7" class="pieCircle"></path><text transform="translate(123.62715523113604,-62.99118183886211)" class="slice" style="text-anchor: middle;">35%</text><text transform="translate(21.70528202433204,137.04175725757537)" class="slice" style="text-anchor: middle;">25%</text><text transform="translate(-131.95909163595255,42.876107969523964)" class="slice" style="text-anchor: middle;">20%</text><text transform="translate(-98.1110658896335,-98.11106588963347)" class="slice" style="text-anchor: middle;">15%</text><text transform="translate(-21.705282024332057,-137.04175725757534)" class="slice" style="text-anchor: middle;">5%</text><text x="0" y="-200" class="pieTitleText">Technology Stack</text><g class="legend" transform="translate(216,-55)"><rect width="18" height="18" style="fill: rgb(70, 110, 170); stroke: rgb(70, 110, 170);"></rect><text x="22" y="14">TanStack Start</text></g><g class="legend" transform="translate(216,-33)"><rect width="18" height="18" style="fill: rgb(30, 70, 140); stroke: rgb(30, 70, 140);"></rect><text x="22" y="14">TypeScript</text></g><g class="legend" transform="translate(216,-11)"><rect width="18" height="18" style="fill: rgb(230, 159, 0); stroke: rgb(230, 159, 0);"></rect><text x="22" y="14">Tailwind CSS</text></g><g class="legend" transform="translate(216,11)"><rect width="18" height="18" style="fill: rgb(0, 114, 178); stroke: rgb(0, 114, 178);"></rect><text x="22" y="14">MDX + Shiki</text></g><g class="legend" transform="translate(216,33)"><rect width="18" height="18" style="fill: rgb(204, 121, 167); stroke: rgb(204, 121, 167);"></rect><text x="22" y="14">Tooling</text></g></g></svg>
