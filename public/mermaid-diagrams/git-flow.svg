<svg id="mermaid-diagrams-git-flow-mmd" xmlns="http://www.w3.org/2000/svg" viewBox="-180.59375 -37.20000076293945 538.59375 379.90167236328125" role="graphics-document document" aria-roledescription="gitGraph" aria-describedby="chart-desc-mermaid-diagrams-git-flow-mmd" aria-labelledby="chart-title-mermaid-diagrams-git-flow-mmd" width="538.59375" height="379.90167236328125"><title id="chart-title-mermaid-diagrams-git-flow-mmd">Git Flow Branching Model</title><desc id="chart-desc-mermaid-diagrams-git-flow-mmd">This diagram shows a typical Git Flow workflow. The main branch (green) represents production code. A develop branch (sky blue) is created for ongoing development. A feature branch called feature/mermaid (orange) is created from develop for implementing the Mermaid.js feature. After two commits on the feature branch, it merges back into develop. Finally, develop merges into main for release, followed by a hotfix commit on main.</desc><style>#mermaid-diagrams-git-flow-mmd{font-family:"Inter",system,-apple-system,"system-ui","Helvetica Neue","Lucida Grande",sans-serif;font-size:16px;fill:#000000;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#mermaid-diagrams-git-flow-mmd .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#mermaid-diagrams-git-flow-mmd .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#mermaid-diagrams-git-flow-mmd .error-icon{fill:#f9f9f9;}#mermaid-diagrams-git-flow-mmd .error-text{fill:#D55E00;stroke:#D55E00;}#mermaid-diagrams-git-flow-mmd .edge-thickness-normal{stroke-width:1px;}#mermaid-diagrams-git-flow-mmd .edge-thickness-thick{stroke-width:3.5px;}#mermaid-diagrams-git-flow-mmd .edge-pattern-solid{stroke-dasharray:0;}#mermaid-diagrams-git-flow-mmd .edge-thickness-invisible{stroke-width:0;fill:none;}#mermaid-diagrams-git-flow-mmd .