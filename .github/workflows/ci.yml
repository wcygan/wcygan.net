name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Install dependencies
        run: deno install --frozen

      # Build first — the TanStack Start Vite plugin generates
      # src/routeTree.gen.ts during build, and typecheck imports it.
      - name: Build
        run: deno task build

      - name: Typecheck
        run: deno task typecheck

      - name: Test
        run: deno task test
