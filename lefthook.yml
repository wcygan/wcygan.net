# Run `deno task --eval "lefthook install"` once after `deno install` to wire up git hooks.
pre-commit:
  parallel: false
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,css,md,mdx,json,yml,yaml}"
      run: deno run --allow-run=git,deno scripts/format-staged.mjs
      stage_fixed: true
    typecheck:
      run: deno task typecheck
    test:
      run: deno task test
